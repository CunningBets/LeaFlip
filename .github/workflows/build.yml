name: "FAP: Build for multiple SDK sources"
# Builds the LeafFlip FAP against the dev and release SDK channels on every push,
# every PR, and on a daily schedule to catch SDK regressions early.
# See https://github.com/marketplace/actions/build-flipper-application-package-fap

on:
  push:
    branches:
      - main
  pull_request:
  schedule:
    # daily build at 01:01 UTC
    - cron: "1 1 * * *"

jobs:
  ufbt-build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - name: dev channel
            sdk-channel: dev
          - name: release channel
            sdk-channel: release
    name: 'ufbt: Build for ${{ matrix.name }}'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Build with ufbt
        uses: flipperdevices/flipperzero-ufbt-action@v0.1
        id: build-app
        with:
          sdk-channel: ${{ matrix.sdk-channel }}
          # If the FAP lives in a subdirectory of the repo, set:
          # app-dir: LeafFlip
      - name: Upload app artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ github.event.repository.name }}-${{ steps.build-app.outputs.suffix }}
          path: ${{ steps.build-app.outputs.fap-artifacts }}
